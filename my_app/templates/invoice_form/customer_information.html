<div class="row">

    <!-- Legal Organization ID -->
    <div class="col-md-5 mb-3">
        <label class="form-label" for="legal_organization_id" required>Tipo de Cliente</label>
        <select id="legal_organization_id" class="form-select" nam="legal_organization_id">
            <option value=""></option>
        </select>
    </div>

    <!-- Identification Document ID -->
    <div class="col-md-5 mb3">
        <label class="form-label" for="identification_document_id" required>Tipo de Documento</label>
        <select id="identification_document_id" class="form-select" name="identification_document_id">
            <option value=""></option>
        </select>
    </div>

    <!-- Identification -->
    <div class="col-md-7 mb-3">
        <label class="form-label" for="identification">Número de Documento</label>
        <input type="text" id="identification" class="form-control" name="identification" required>
    </div>

    <!-- DV -->
    <div class="col-md-3 mb-3">
        <label class="form-label" for="dv">Dígito de Verificación</label>
        <input type="text" id="dv" class="form-control" name="dv" required>
    </div>

    <!-- Names -->
    <div class="col-md-5 mb-3">
        <label class="form-label" for="names">Nombre del cliente</label>
        <input type="text" id="names" class="form-control" name="names" required>
    </div>

    <!-- Address -->
    <div class="col-md-5 mb-3">
        <label class="form-label" for="address">Dirección</label>
        <input type="text" id="address" class="form-control" name="address">
    </div>

    <!-- Email -->
    <div class="col-md-5 mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-control" name="email">
    </div>

    <!-- Phone -->
    <div class="col-md-5 mb-3">
        <label class="form-label" for="phone">Teléfono</label>
        <input type="text" id="phone" class="form-control" name="phone" required>
    </div>

    <!-- Tribute ID -->
    <div class="col-md-5 mb-3">
        <label class="form-label" for="tribute_id" required>Tipo de Impuesto</label>
        <select id="tribute_id" class="form-select" name="tribute_id">
            <option value=""></option>
        </select>
    </div>

</div>
